apiVersion: v1
kind: ConfigMap
metadata:
  name: llmops-config
  namespace: llmops
data:
  # LLM provider: "ollama" | "vllm" | "azure_openai" | "huggingface"
  LLM_PROVIDER: "vllm"
  VLLM_BASE_URL: "http://vllm-service:8001/v1"
  VLLM_MODEL: "meta-llama/Llama-3.2-1B-Instruct"
  # Search backend: "elasticsearch" | "azure_search"
  SEARCH_PROVIDER: "elasticsearch"
  ELASTICSEARCH_HOST: "http://elasticsearch-service:9200"
  # Database
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_USER: "llmops"
  DB_NAME: "llmops"
