# HorizontalPodAutoscaler — scales the API tier based on CPU and memory.
# vLLM is NOT autoscaled (GPU nodes are expensive; scale manually or via KEDA).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llmops-api-hpa
  namespace: llmops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llmops-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # wait 60s before scaling up again
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5min before scaling down (avoids flapping)
