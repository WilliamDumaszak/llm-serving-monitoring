llm:
  provider: "ollama"           # "ollama" | "huggingface" | "azure_openai" | "vllm"
  model: "llama3.2"
  ollama_base_url: "http://ollama:11434"
  hf_model: "google-bert/bert-large-uncased-whole-word-masking-finetuned-squad"
  temperature: 0.3
  max_tokens: 512
  # Azure OpenAI — active when provider: azure_openai (set via env vars)
  azure_openai_endpoint: ""    # AZURE_OPENAI_ENDPOINT
  azure_openai_deployment: "gpt-4o-mini"
  azure_openai_api_version: "2024-02-01"
  # vLLM — high-throughput inference (OpenAI-compatible API, best for production GPU)
  vllm_base_url: "http://vllm:8001/v1"    # VLLM_BASE_URL
  vllm_model: "meta-llama/Llama-3.2-1B-Instruct"

search:
  provider: "elasticsearch"    # "elasticsearch" | "azure_search"
  index_name: "rag_documents"
  top_k: 5
  # Elasticsearch — active when provider: elasticsearch
  elasticsearch_host: "http://elasticsearch:9200"
  # Azure AI Search — active when provider: azure_search (set via env vars)
  azure_search_endpoint: ""    # AZURE_SEARCH_ENDPOINT

database:
  host: "postgres"
  port: 5432
  user: "llmops"
  password: "llmops"
  dbname: "llmops"

api:
  host: "0.0.0.0"
  port: 8000

evaluation:
  ground_truth_path: "evaluation/ground_truth.csv"
